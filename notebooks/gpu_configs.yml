# GPU training profiles for yoctoGPT notebooks.
# Auto-selected by the GPU detection cell; fallback is t4.
#
# Profiles per notebook section:
#   char_small     — NB01 tiny 2-layer run
#   char_deeper    — NB01 GPU-optimized run (used for both baseline gpt
#                    and gpt_fast; batch_size is safe for baseline O(n^2)
#                    attention, batch_size_fast for gpt_fast/FlashAttention)
#   char_large     — NB02 large char-level run
#   token          — NB03 token-level run
#   token_finance  — NB04 finance token-level run
#   transfer       — NB05 transfer learning (combined general + finance corpus)

t4:  # 15 GB, Turing, no native bf16
  amp_dtype: fp16
  char_small:
    n_layer: 2
    n_head: 4
    n_embd: 128
    block_size: 128
    batch_size: 24
  char_deeper:
    n_layer: 6
    n_head: 6
    n_embd: 384
    block_size: 256
    batch_size: 24
    batch_size_fast: 48
  char_large:
    n_layer: 6
    n_head: 6
    n_embd: 384
    block_size: 384
    batch_size: 64
  token:
    n_layer: 4
    n_head: 4
    n_embd: 256
    block_size: 256
    batch_size: 48
  token_finance:
    n_layer: 4
    n_head: 4
    n_embd: 256
    block_size: 256
    batch_size: 48
  transfer:
    n_layer: 4
    n_head: 4
    n_embd: 256
    block_size: 256
    batch_size: 48

